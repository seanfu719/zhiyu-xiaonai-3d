<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植愈小奈 - 3D 手办</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #2d5016 0%, #4a7c2e 30%, #6da84d 60%, #8bc34a 100%);
      overflow: hidden; font-family: system-ui, sans-serif;
    }
    model-viewer {
      width: 100vw; height: 100vh;
      --progress-bar-color: #ffffff;
      --progress-bar-height: 4px;
    }
    .title {
      position: fixed; bottom: 40px; left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,0.9);
      font-size: 18px; letter-spacing: 4px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
      pointer-events: none; z-index: 10;
    }
    .title small {
      display: block; font-size: 12px; margin-top: 6px;
      opacity: 0.6; letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <model-viewer
    src="model_textured.glb"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="40deg"
    shadow-intensity="0"
    exposure="1.0"
    tone-mapping="neutral"
    interaction-prompt="none"
    min-camera-orbit="auto 10deg auto"
    max-camera-orbit="auto 130deg auto">
  </model-viewer>
  <div class="title">
    植愈小奈
    <small>超能植愈系列 · Q版手办</small>
  </div>
</body>
</html>
